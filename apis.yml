properties:
  - type: Organization
    data:
      legalName: Liberty Energy Inc
      formerName: Liberty Oilfield Services
      ticker: NYSE:LBRT
      founded: 2011
      ipo: 2018-01
      headquarters: 950 17th Street, Suite 2400, Denver, CO 80202
      phone: 303.515.2800
      ceo: Ron Gusek
      cfo: Michael Stock
      founder: Chris Wright
      founderNote: |
        Chris Wright founded Liberty in 2011 and led it as CEO through the IPO,
        the OneStim acquisition, and the Liberty Power Innovations launch.
        In 2025 he was confirmed as the 17th United States Secretary of Energy
        in the Trump administration, exiting the company.
      revenue2025: 4.01B USD
      netIncome2025: 147.87M USD
      fortuneRank: Fortune 1000

  - type: BusinessSegments
    data:
      - name: Completion Services
        description: |
          Hydraulic fracturing, wireline, and sand & logistics for onshore oil
          and gas producers. Liberty is the second-largest frac service provider
          in North America after the December 2020 OneStim acquisition from
          Schlumberger.
        services:
          - Hydraulic Fracturing (digiFrac electric fleets, digiPrime hybrid)
          - Wireline (100% greaseless modular systems with cloud data)
          - Sand and Logistics (PropX containerized sand, Freedom Proppant)
      - name: Liberty Power Innovations (LPI)
        description: |
          Launched April 2023. Distributed natural-gas-fueled power generation,
          CNG fueling, field gas processing, grid-interconnected backup, and
          24/7 operations management. Originally built to vertically integrate
          fueling for Liberty's own frac fleets, now pivoting aggressively into
          dispatchable power for data centers and AI infrastructure.
        offerings:
          - Power as a Service
          - CNG fueling delivery
          - Field gas processing
          - Grid-interconnected backup
          - Modular natural gas generation (baseload, backup, peak)
      - name: Technology & Manufacturing
        description: |
          digiTechnologies (electric and hybrid fleets), Liberty Advanced
          Equipment Technology (LAET) design and manufacturing, production
          and engineering services, maintenance and emissions solutions.

  - type: PowerPivot
    title: Liberty Power / Data Center & AI Infrastructure Pivot
    data:
      summary: |
        Liberty is transitioning from a pure oilfield-services pure-play into a
        hybrid completions + distributed-power company. Liberty Power Innovations
        (LPI) is being marketed as a dispatchable power provider for hyperscale
        data centers and AI compute build-outs. Power is being sold as PaaS
        with on-site natural gas generation behind the meter.
      keyDeals:
        - partner: Vantage Data Centers
          date: 2026-01
          scope: Strategic partnership to develop and operate 1 GW of power solutions for next-generation data centers
        - partner: Bergen Engines
          date: 2026-05
          scope: Over 500 MW of on-site generation capacity to support large-scale data center developments
        - partner: Oklo Inc
          date: 2025-07
          scope: Next-generation integrated power solution launch (advanced nuclear + nat gas)
        - partner: IMG Energy Solutions
          date: 2025-03
          scope: Acquisition extending LPI's distributed power footprint
      strategicInvestments:
        - target: Fervo Energy
          date: 2022-07
          thesis: Next-generation enhanced geothermal energy
        - target: Natron Energy
          date: 2022-09
          thesis: Sodium-ion battery manufacturing for grid storage

  - type: ProprietaryPlatforms
    description: |
      Internal / customer-facing software products. These are NOT public APIs;
      they are operational platforms surfaced to Liberty customers via portals
      and post-job reports. No SDKs, OpenAPI, or developer portal exist.
    data:
      - name: FracTrends
        description: Proprietary viewer over a 60,000+ well database for real-time frac optimization.
      - name: Sentinel
        description: Sand/proppant logistics platform that uses real-time data to forecast volumes and pre-empt logistics issues.
      - name: digiTechnologies
        description: Modular electric and hybrid frac fleet control system, marketed as bringing "advanced AI technology" to the frac site.
      - name: digiFrac
        description: Fully electric hydraulic fracturing pump fleet (field tested 2021).
      - name: digiPrime
        description: Hybrid natural-gas fracturing fleets.
      - name: digiFleets
        description: Fleet family delivering "50% lower emissions vs. conventional Tier IV diesel."

