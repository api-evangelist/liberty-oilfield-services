name: Liberty Energy
description: |
  Liberty Energy Inc (NYSE: LBRT), formerly Liberty Oilfield Services, is a Denver-based
  energy services company. It is one of the largest providers of completion services
  (hydraulic fracturing, wireline, sand and logistics) to onshore oil, natural gas, and
  enhanced geothermal producers in North America, and it is rapidly pivoting into
  distributed power generation for data centers and AI infrastructure via its Liberty
  Power Innovations (LPI) subsidiary. Founded in 2011 by Chris Wright, who left in 2025
  to become the 17th US Secretary of Energy under the Trump administration. Ron Gusek
  is now President and CEO. The company does not publish any public developer APIs;
  this profile documents the organization, its proprietary internal platforms
  (FracTrends, Sentinel, digiTechnologies), and the Liberty Power data center pivot.
